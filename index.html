<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR SPACE — 3D Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
/* ══════════════════════════════════════════════
   Custom Properties
══════════════════════════════════════════════ */
:root {
  --bg:         #06060f;
  --card-bg:    #0e0e1f;
  --card-bg2:   #111126;
  --surface:    rgba(255,255,255,0.042);
  --border:     rgba(255,255,255,0.11);
  --text:       #eeeeff;
  --muted:      rgba(180,182,220,0.55);
  --radius:     22px;
  --ease:       cubic-bezier(0.23, 1, 0.32, 1);
  --ease-back:  cubic-bezier(0.34, 1.20, 0.64, 1);
}

/* ══════════════════════════════════════════════
   Reset
══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; color-scheme: dark; -webkit-font-smoothing: antialiased; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', -apple-system, sans-serif;
  min-height: 100svh;
  overflow-x: hidden;
}
@media (hover: hover) { body { cursor: none; } }

/* ══════════════════════════════════════════════
   Custom Cursor
══════════════════════════════════════════════ */
#cur-dot {
  position: fixed; z-index: 9999; pointer-events: none;
  width: 7px; height: 7px;
  background: #818cf8;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width .18s, height .18s, background .2s;
  mix-blend-mode: screen;
}
#cur-ring {
  position: fixed; z-index: 9998; pointer-events: none;
  width: 34px; height: 34px;
  border: 1.5px solid rgba(129,140,248,.45);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width .32s var(--ease), height .32s var(--ease), border-color .22s, opacity .2s;
}
.card-wrap:hover ~ #cur-ring,
body:has(.card-wrap:hover) #cur-ring {
  width: 52px; height: 52px;
  border-color: rgba(129,140,248,.9);
}
@media (hover: none) { #cur-dot, #cur-ring { display: none; } }

/* ══════════════════════════════════════════════
   Aurora / Noise Background
══════════════════════════════════════════════ */
.aurora {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
}
.blob {
  position: absolute; border-radius: 50%;
  filter: blur(110px); opacity: 1;
}
.b1 {
  width: 72vw; height: 72vw;
  background: radial-gradient(circle, rgba(99,102,241,.17), transparent 62%);
  top: -28%; left: -16%;
  animation: bf1 22s ease-in-out infinite alternate;
}
.b2 {
  width: 58vw; height: 58vw;
  background: radial-gradient(circle, rgba(6,182,212,.13), transparent 62%);
  bottom: -26%; right: -12%;
  animation: bf2 28s ease-in-out infinite alternate;
}
.b3 {
  width: 44vw; height: 44vw;
  background: radial-gradient(circle, rgba(168,85,247,.11), transparent 62%);
  top: 32%; left: 38%;
  animation: bf3 34s ease-in-out infinite alternate;
}
.b4 {
  width: 30vw; height: 30vw;
  background: radial-gradient(circle, rgba(244,114,182,.10), transparent 62%);
  top: 10%; right: 18%;
  animation: bf4 18s ease-in-out infinite alternate;
}
@keyframes bf1 { to { transform: translate(14vw, 9vh) scale(1.14); } }
@keyframes bf2 { to { transform: translate(-11vw, -7vh) scale(.88); } }
@keyframes bf3 { to { transform: translate(-20vw, 14vh) scale(1.22); } }
@keyframes bf4 { to { transform: translate(8vw, 18vh) scale(1.1); } }

/* Dot grid */
.dot-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(circle, rgba(255,255,255,.055) 1px, transparent 1px);
  background-size: 30px 30px;
  mask-image: radial-gradient(ellipse 90% 85% at 50% 45%, rgba(0,0,0,.55), transparent);
  -webkit-mask-image: radial-gradient(ellipse 90% 85% at 50% 45%, rgba(0,0,0,.55), transparent);
}

/* ══════════════════════════════════════════════
   Layout
══════════════════════════════════════════════ */
.wrap {
  position: relative; z-index: 1;
  max-width: 1160px;
  margin: 0 auto;
  padding: 0 20px 110px;
}

/* ══════════════════════════════════════════════
   Navigation
══════════════════════════════════════════════ */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 26px 0 28px;
}
.nav-brand { display: flex; align-items: center; gap: 11px; text-decoration: none; }
.nav-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 12px; font-weight: 900; color: #fff;
  letter-spacing: .06em;
  box-shadow: 0 0 24px rgba(99,102,241,.45), inset 0 1px 0 rgba(255,255,255,.2);
}
.nav-name {
  font-size: 13px; font-weight: 700;
  letter-spacing: .14em;
  background: linear-gradient(90deg, rgba(255,255,255,.95), rgba(255,255,255,.35));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.nav-pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 600; letter-spacing: .14em;
  color: rgba(52,211,153,.9);
  border: 1px solid rgba(52,211,153,.2);
  padding: 6px 14px; border-radius: 100px;
  background: rgba(52,211,153,.055);
}
.pulse { width: 6px; height: 6px; border-radius: 50%; background: #34d399; animation: blink 2.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ══════════════════════════════════════════════
   Hero
══════════════════════════════════════════════ */
.hero { padding: 36px 0 48px; }
.hero-tag {
  display: inline-flex; align-items: center; gap: 9px;
  font-size: 10px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase;
  color: #818cf8; margin-bottom: 24px;
}
.hero-tag::before {
  content: ''; display: inline-block;
  width: 22px; height: 1px;
  background: linear-gradient(90deg, #818cf8, transparent);
}
.hero-h1 {
  font-size: clamp(38px, 7.5vw, 76px);
  font-weight: 900; line-height: 1.04; letter-spacing: -.025em;
  margin-bottom: 24px;
}
.hero-h1 .shine {
  display: block;
  background: linear-gradient(110deg, #818cf8 0%, #38bdf8 38%, #c084fc 68%, #f472b6 100%);
  background-size: 250% auto;
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine-move 5s linear infinite alternate;
}
@keyframes shine-move { to { background-position: 100% center; } }
.hero-body {
  font-size: 15px; font-weight: 300;
  color: var(--muted); line-height: 1.78;
  max-width: 440px;
}

/* ══════════════════════════════════════════════
   Section header
══════════════════════════════════════════════ */
.sec-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.sec-label { font-size: 10px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
.sec-count { font-size: 10px; font-weight: 600; letter-spacing: .14em; color: rgba(129,140,248,.65); }

/* ══════════════════════════════════════════════
   Bento Grid
══════════════════════════════════════════════ */
.bento {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 13px;
}
.card-wrap:nth-child(1) { grid-column: span 2; }
.card-wrap:nth-child(4) { grid-column: span 2; }

@media (max-width: 840px) {
  .bento { grid-template-columns: repeat(2, 1fr); }
  .card-wrap:nth-child(1),
  .card-wrap:nth-child(4) { grid-column: span 2; }
}
@media (max-width: 500px) {
  .bento { grid-template-columns: 1fr; }
  .card-wrap:nth-child(1),
  .card-wrap:nth-child(4) { grid-column: span 1; }
}

/* ══════════════════════════════════════════════
   Iridescent border wrapper
══════════════════════════════════════════════ */
.card-wrap {
  position: relative;
  border-radius: calc(var(--radius) + 1.5px);
  padding: 1.5px;
  background: linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,.07));
  opacity: 0;
  transform: translateY(26px) scale(.98);
  transition: opacity .6s var(--ease), transform .6s var(--ease), background .35s;
}
.card-wrap.in-view { opacity: 1; transform: none; }

/* Iridescent border on hover — static gradient, rotated on hover */
.card-wrap::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, #6366f1, #38bdf8, #a855f7, #f472b6, #34d399);
  opacity: 0; transition: opacity .4s;
  z-index: -1;
}
.card-wrap:hover::before { opacity: 1; }

/* ══════════════════════════════════════════════
   Model Card
══════════════════════════════════════════════ */
.card {
  position: relative;
  border-radius: var(--radius);
  background: linear-gradient(160deg, var(--card-bg2) 0%, var(--card-bg) 100%);
  overflow: hidden;
  cursor: none;
  transition: transform .4s var(--ease), box-shadow .4s var(--ease);
  /* JS sets --rx, --ry for tilt */
  transform: perspective(900px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));
}
.card {
  box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 0 0 0 transparent;
}
.card-wrap:hover .card {
  box-shadow:
    0 28px 80px rgba(0,0,0,.65),
    0 0  50px var(--glow, rgba(129,140,248,.18));
}

/* Holographic scan-line shimmer */
.card::after {
  content: '';
  position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 3px,
    rgba(255,255,255,.013) 3px, rgba(255,255,255,.013) 4px
  );
  opacity: 0; transition: opacity .4s;
}
.card-wrap:hover .card::after { opacity: 1; }

/* Inner glow tint on hover */
.card-glow {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(ellipse 70% 60% at 50% 0%, var(--glow, rgba(129,140,248,.08)), transparent);
  opacity: 0; transition: opacity .45s;
}
.card-wrap:hover .card-glow { opacity: 1; }

/* ── Card viewer: CSS-only orbital preview ── */
.card-viewer {
  position: relative;
  height: 200px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse 80% 70% at 50% 50%,
    var(--card-orb-bg, rgba(99,102,241,.08)), transparent 70%);
}
.card-wrap:nth-child(1) .card-viewer { height: 260px; }

/* Orbital scene */
.orb-scene {
  position: relative;
  width: 140px; height: 140px;
  /* Note: no transform-style:preserve-3d to avoid GPU compositing layer */
}
.card-wrap:nth-child(1) .orb-scene { width: 180px; height: 180px; }

/* Core sphere */
.orb-core {
  position: absolute; inset: 25%;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 32%,
    rgba(255,255,255,.28) 0%,
    var(--card-orb-a, rgba(99,102,241,1)) 40%,
    var(--card-orb-b, rgba(168,85,247,1)) 100%);
  box-shadow:
    0 0 30px var(--card-orb-glow, rgba(99,102,241,.7)),
    inset 0 0 20px rgba(255,255,255,.1);
  animation: orb-breathe 4s ease-in-out infinite;
}
@keyframes orb-breathe {
  0%,100% { transform: scale(1); box-shadow: 0 0 30px var(--card-orb-glow), inset 0 0 20px rgba(255,255,255,.1); }
  50%      { transform: scale(1.06); box-shadow: 0 0 50px var(--card-orb-glow), inset 0 0 25px rgba(255,255,255,.15); }
}

/* Orbital ring base */
.orb-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1.5px solid transparent;
}
.orb-ring-1 {
  border-color: var(--card-orb-r1, rgba(99,102,241,.5));
  transform: rotateX(72deg) rotateZ(20deg);
  animation: spin-ring-1 6s linear infinite;
  box-shadow: 0 0 8px var(--card-orb-r1, rgba(99,102,241,.3));
}
.orb-ring-2 {
  inset: 8%;
  border-color: var(--card-orb-r2, rgba(168,85,247,.45));
  transform: rotateX(65deg) rotateZ(-40deg);
  animation: spin-ring-2 9s linear infinite reverse;
  box-shadow: 0 0 6px var(--card-orb-r2, rgba(168,85,247,.3));
}
.orb-ring-3 {
  inset: -8%;
  border-color: var(--card-orb-r3, rgba(56,189,248,.3));
  transform: rotateX(30deg) rotateZ(70deg);
  animation: spin-ring-1 13s linear infinite;
  opacity: .7;
}
/* Dot on ring 1 */
.orb-ring-1::after {
  content: '';
  position: absolute; top: -3px; left: calc(50% - 3px);
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--card-orb-a, #6366f1);
  box-shadow: 0 0 10px var(--card-orb-a, #6366f1);
}
.orb-ring-2::after {
  content: '';
  position: absolute; bottom: -2.5px; right: calc(50% - 2.5px);
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--card-orb-r2, #a855f7);
  box-shadow: 0 0 8px var(--card-orb-r2, #a855f7);
}

@keyframes spin-ring-1 { to { transform: rotateX(72deg) rotateZ(380deg); } }
@keyframes spin-ring-2 { to { transform: rotateX(65deg) rotateZ(-400deg); } }

/* Floating particle dots */
.orb-dots {
  position: absolute; inset: -20%;
  animation: spin-ring-1 20s linear infinite;
}
.orb-dots::before, .orb-dots::after {
  content: '';
  position: absolute;
  width: 3px; height: 3px; border-radius: 50%;
  background: rgba(255,255,255,.4);
}
.orb-dots::before { top: 15%; left: 10%; animation: flicker 3s ease-in-out infinite; }
.orb-dots::after  { bottom: 20%; right: 12%; animation: flicker 4s ease-in-out infinite .8s; }
@keyframes flicker { 0%,100%{opacity:.2} 50%{opacity:.9} }

/* Number tag */
.orb-tag {
  position: absolute; bottom: 14px;
  font-size: 9px; font-weight: 700; letter-spacing: .22em;
  color: var(--muted); text-align: center; width: 100%;
  text-transform: uppercase;
}

/* Card footer */
.card-foot {
  position: relative; z-index: 6;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 10px;
  padding: 15px 20px 20px;
  border-top: 1px solid rgba(255,255,255,.058);
}
.foot-meta {}
.foot-num { font-size: 10px; font-weight: 600; letter-spacing: .2em; color: var(--muted); margin-bottom: 3px; }
.foot-name { font-size: 15px; font-weight: 700; letter-spacing: .01em; margin-bottom: 2px; }
.foot-sub { font-size: 11px; color: var(--muted); }
.ar-chip {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: .1em; white-space: nowrap;
  padding: 8px 14px; border-radius: 100px;
  background: rgba(129,140,248,.1);
  border: 1px solid rgba(129,140,248,.28);
  color: #818cf8;
  transition: .35s var(--ease);
}
.card-wrap:hover .ar-chip {
  background: rgba(129,140,248,.22);
  border-color: rgba(129,140,248,.6);
  box-shadow: 0 0 22px rgba(129,140,248,.25);
  transform: translateX(3px);
}
.ar-chip svg { transition: transform .25s var(--ease); }
.card-wrap:hover .ar-chip svg { transform: rotate(-45deg) scale(1.1); }

/* ══════════════════════════════════════════════
   AR Bottom Sheet Modal
══════════════════════════════════════════════ */
#ar-modal {
  position: fixed; inset: 0; z-index: 800;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .3s ease, backdrop-filter .3s;
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px);
}
#ar-modal::before {
  content: ''; position: absolute; inset: 0;
  background: rgba(0,0,0,0); transition: background .3s;
}
#ar-modal.open {
  opacity: 1; pointer-events: all;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
#ar-modal.open::before { background: rgba(0,0,6,.75); }

.ar-sheet {
  position: relative; z-index: 1;
  width: 100%; max-width: 560px;
  background: linear-gradient(180deg, rgba(16,16,32,.98), rgba(8,8,20,.99));
  border: 1px solid rgba(255,255,255,.09); border-bottom: none;
  border-radius: 30px 30px 0 0;
  padding: 14px 28px calc(44px + env(safe-area-inset-bottom,0px));
  transform: translateY(100%);
  transition: transform .5s var(--ease-back);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 -30px 80px rgba(0,0,0,.5);
}
#ar-modal.open .ar-sheet { transform: translateY(0); }

.sheet-handle {
  width: 40px; height: 4px; border-radius: 100px;
  background: rgba(255,255,255,.13);
  margin: 0 auto 26px;
}

/* Selected model card in sheet */
.sheet-card {
  display: flex; align-items: center; gap: 15px;
  background: rgba(255,255,255,.028);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 18px; padding: 14px 16px;
  margin-bottom: 26px; position: relative; overflow: hidden;
}
.sheet-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--sc-color, rgba(129,140,248,.08)), transparent);
  pointer-events: none;
}
.sc-thumb {
  width: 56px; height: 56px; border-radius: 14px;
  display: grid; place-items: center; font-size: 26px; flex-shrink: 0;
  background: var(--sc-bg, rgba(129,140,248,.1));
  border: 1px solid var(--sc-bd, rgba(129,140,248,.22));
}
.sc-tag { font-size: 10px; font-weight: 600; letter-spacing: .18em; color: var(--muted); margin-bottom: 3px; }
.sc-name { font-size: 17px; font-weight: 800; }

.sheet-h { font-size: 23px; font-weight: 900; letter-spacing: -.01em; margin-bottom: 8px; }
.sheet-p { font-size: 13px; font-weight: 300; color: var(--muted); line-height: 1.75; margin-bottom: 28px; }

/* Quick Look iOS trigger */
#ios-link { display: none; text-decoration: none; width: 100%; margin-bottom: 12px; }
#ios-link img { display: none; }

.s-btn {
  display: flex; align-items: center; justify-content: center; gap: 9px;
  width: 100%; padding: 18px; border-radius: 18px;
  font-size: 15px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: .02em; border: none; cursor: pointer;
  transition: .35s var(--ease);
}
.s-btn-primary {
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 55%, #c084fc 100%);
  color: #fff;
  box-shadow: 0 10px 40px rgba(99,102,241,.42);
  margin-bottom: 12px;
}
.s-btn-primary:hover { transform: translateY(-3px); box-shadow: 0 16px 52px rgba(99,102,241,.58); }
.s-btn-primary:active { transform: scale(.97); }
.s-btn-ghost {
  background: rgba(255,255,255,.045); color: rgba(255,255,255,.55);
  border: 1px solid rgba(255,255,255,.09);
}
.s-btn-ghost:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.9); }

/* ══════════════════════════════════════════════
   Fade-in stagger for hero
══════════════════════════════════════════════ */
[data-in] { opacity: 0; transform: translateY(18px); }
  </style>
</head>
<body>

<!-- Cursor -->
<div id="cur-dot"></div>
<div id="cur-ring"></div>

<!-- Background layers -->
<div class="aurora" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
</div>
<div class="dot-grid" aria-hidden="true"></div>

<!-- ─────────────────────────────────── APP ─── -->
<div class="wrap">

  <!-- Nav -->
  <nav>
    <div class="nav-brand">
      <div class="nav-mark">AR</div>
      <span class="nav-name">AR·SPACE</span>
    </div>
    <div class="nav-pill">
      <span class="pulse"></span>
      AR READY
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-tag" data-in>Augmented Reality Experience</div>
    <h1 class="hero-h1" data-in>
      現実に溶け込む<br>
      <span class="shine">3D の世界へ</span>
    </h1>
    <p class="hero-body" data-in>
      モデルを選択してARを起動。スマートフォンの<br>
      カメラで現実空間に3Dオブジェクトを配置できます。
    </p>
  </section>

  <!-- Gallery -->
  <div class="sec-header" data-in>
    <span class="sec-label">モデルを選択</span>
    <span class="sec-count">5 OBJECTS</span>
  </div>

  <div class="bento" id="bento"></div>

</div>
<!-- ───────────────────────── END APP ─── -->

<!-- AR Modal -->
<div id="ar-modal" role="dialog" aria-modal="true" aria-label="ARカメラ起動">
  <div class="ar-sheet">
    <div class="sheet-handle"></div>

    <div class="sheet-card">
      <div class="sc-thumb" id="sc-thumb">⬡</div>
      <div>
        <div class="sc-tag">選択中のモデル</div>
        <div class="sc-name" id="sc-name">—</div>
      </div>
    </div>

    <div class="sheet-h">ARカメラを起動</div>
    <p class="sheet-p">
      カメラを使って現実空間に3Dモデルを配置します。<br>
      明るい場所・平らな面の上でお試しください。
    </p>

    <!-- iOS AR Quick Look (rel="ar" が必須) -->
    <a id="ios-link" rel="ar" href="#">
      <img src="" alt="">
      <span class="s-btn s-btn-primary">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M2 12a10 10 0 1 0 20 0 10 10 0 0 0-20 0z" stroke-opacity=".4"/>
          <path d="M4.9 4.9l.7.7M18.4 4.9l-.7.7M4.9 19.1l.7-.7M18.4 19.1l-.7-.7"/>
        </svg>
        カメラを起動する
      </span>
    </a>

    <!-- Android / other -->
    <button id="btn-android" class="s-btn s-btn-primary" style="display:none">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M2 12a10 10 0 1 0 20 0 10 10 0 0 0-20 0z" stroke-opacity=".4"/>
        <path d="M4.9 4.9l.7.7M18.4 4.9l-.7.7M4.9 19.1l.7-.7M18.4 19.1l-.7-.7"/>
      </svg>
      カメラを起動する
    </button>

    <button id="btn-close" class="s-btn s-btn-ghost">閉じる</button>
  </div>
</div>

<!-- ──────────────────────── SCRIPT ─── -->
<script>
/* ─────────── Model data ─────────── */
const MODELS = [
  { id:1, name:'モデル 01', sub:'Object · GLB / USDZ', emoji:'🔷',
    orbA:'#6366f1', orbB:'#8b5cf6', orbGlow:'rgba(99,102,241,.7)',
    orbR1:'rgba(99,102,241,.55)', orbR2:'rgba(168,85,247,.5)', orbR3:'rgba(56,189,248,.3)',
    orbBg:'rgba(99,102,241,.09)', r:129, g:140, b:248 },
  { id:2, name:'モデル 02', sub:'Object · GLB / USDZ', emoji:'🌊',
    orbA:'#06b6d4', orbB:'#0ea5e9', orbGlow:'rgba(6,182,212,.7)',
    orbR1:'rgba(6,182,212,.55)', orbR2:'rgba(14,165,233,.5)', orbR3:'rgba(99,102,241,.3)',
    orbBg:'rgba(6,182,212,.09)', r:56, g:189, b:248 },
  { id:3, name:'モデル 03', sub:'Object · GLB / USDZ', emoji:'🔮',
    orbA:'#a855f7', orbB:'#c084fc', orbGlow:'rgba(168,85,247,.7)',
    orbR1:'rgba(168,85,247,.55)', orbR2:'rgba(192,132,252,.5)', orbR3:'rgba(244,114,182,.3)',
    orbBg:'rgba(168,85,247,.09)', r:192, g:132, b:252 },
  { id:4, name:'モデル 04', sub:'Object · GLB / USDZ', emoji:'🌿',
    orbA:'#10b981', orbB:'#34d399', orbGlow:'rgba(16,185,129,.7)',
    orbR1:'rgba(16,185,129,.55)', orbR2:'rgba(52,211,153,.5)', orbR3:'rgba(6,182,212,.3)',
    orbBg:'rgba(16,185,129,.09)', r:52, g:211, b:153 },
  { id:5, name:'モデル 05', sub:'Object · GLB / USDZ', emoji:'🌸',
    orbA:'#f43f5e', orbB:'#fb7185', orbGlow:'rgba(244,63,94,.7)',
    orbR1:'rgba(244,63,94,.55)', orbR2:'rgba(251,113,133,.5)', orbR3:'rgba(168,85,247,.3)',
    orbBg:'rgba(244,63,94,.09)', r:244, g:114, b:182 },
];

/* ─────────── Build cards ─────────── */
const bento = document.getElementById('bento');

MODELS.forEach((m, i) => {
  const glow = `rgba(${m.r},${m.g},${m.b},.18)`;
  const num  = String(m.id).padStart(2,'0');

  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';
  wrap.style.transitionDelay = `${i * 85}ms`;
  wrap.dataset.id = m.id;

  wrap.innerHTML = `
    <div class="card" style="
      --glow:${glow};
      --card-orb-a:${m.orbA}; --card-orb-b:${m.orbB};
      --card-orb-glow:${m.orbGlow};
      --card-orb-r1:${m.orbR1}; --card-orb-r2:${m.orbR2}; --card-orb-r3:${m.orbR3};
      --card-orb-bg:${m.orbBg};
    ">
      <div class="card-glow"></div>
      <div class="card-viewer">
        <div class="orb-scene">
          <div class="orb-core"></div>
          <div class="orb-ring orb-ring-1"></div>
          <div class="orb-ring orb-ring-2"></div>
          <div class="orb-ring orb-ring-3"></div>
          <div class="orb-dots"></div>
        </div>
        <div class="orb-tag">OBJECT ${num}</div>
      </div>
      <div class="card-foot">
        <div class="foot-meta">
          <div class="foot-num">OBJECT ${num}</div>
          <div class="foot-name">${m.name}</div>
          <div class="foot-sub">${m.sub}</div>
        </div>
        <div class="ar-chip">
          AR
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M7 17L17 7M7 7h10v10"/>
          </svg>
        </div>
      </div>
    </div>`;

  wrap.addEventListener('click', () => openModal(m));

  /* 3D tilt */
  const card = wrap.querySelector('.card');
  wrap.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width  - .5) * 2;
    const y = ((e.clientY - r.top)  / r.height - .5) * 2;
    card.style.setProperty('--ry', `${x * 5.5}deg`);
    card.style.setProperty('--rx', `${-y * 5.5}deg`);
  });
  wrap.addEventListener('mouseleave', () => {
    card.style.setProperty('--ry', '0deg');
    card.style.setProperty('--rx', '0deg');
  });

  bento.appendChild(wrap);
});

/* ─────────── Card reveal (IntersectionObserver + fallback) ─────────── */
function revealCards() {
  document.querySelectorAll('.card-wrap').forEach((w, i) => {
    setTimeout(() => w.classList.add('in-view'), 100 + i * 90);
  });
}

// Try IntersectionObserver first; fall back to immediate reveal
const cardObs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in-view'); });
}, { threshold: 0, rootMargin: '0px 0px 400px 0px' });
document.querySelectorAll('.card-wrap').forEach(w => cardObs.observe(w));

// Guaranteed fallback: reveal all after 800ms regardless
setTimeout(() => {
  if (!document.querySelector('.card-wrap.in-view')) revealCards();
}, 800);

// (model-viewer is loaded only on AR launch, not in preview cards)

/* ─────────── Hero entrance animation ─────────── */
document.querySelectorAll('[data-in]').forEach((el, i) => {
  el.style.transition = `opacity .72s ease ${i*130}ms, transform .72s ease ${i*130}ms`;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
  }));
});

/* ─────────── Custom cursor ─────────── */
const dot  = document.getElementById('cur-dot');
const ring = document.getElementById('cur-ring');
let mx=0, my=0, rx=0, ry=0;

document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
(function animCursor() {
  dot.style.left  = mx+'px';
  dot.style.top   = my+'px';
  rx += (mx-rx) * .11;
  ry += (my-ry) * .11;
  ring.style.left = rx+'px';
  ring.style.top  = ry+'px';
  requestAnimationFrame(animCursor);
})();

/* ─────────── AR Modal ─────────── */
const modal   = document.getElementById('ar-modal');
const iosLink = document.getElementById('ios-link');
const btnAnd  = document.getElementById('btn-android');
const btnCls  = document.getElementById('btn-close');
const scThumb = document.getElementById('sc-thumb');
const scName  = document.getElementById('sc-name');
const shCard  = document.querySelector('.sheet-card');

const isIOS     = /iPhone|iPad|iPod/i.test(navigator.userAgent);
const isAndroid = /Android/i.test(navigator.userAgent);
let active = null;

function openModal(m) {
  active = m;
  scThumb.textContent = m.emoji;
  scName.textContent  = m.name;

  const c = `rgba(${m.r},${m.g},${m.b}`;
  shCard.style.setProperty('--sc-color', `${c},.09)`);
  scThumb.style.setProperty('--sc-bg', `${c},.12)`);
  scThumb.style.setProperty('--sc-bd', `${c},.26)`);

  const base = location.href.replace(/\/[^/]*$/, '/');

  if (isIOS) {
    iosLink.href = `${base}${m.id}.usdz`;
    iosLink.style.display = 'block';
    btnAnd.style.display  = 'none';
  } else {
    iosLink.style.display = 'none';
    btnAnd.style.display  = 'flex';
  }

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modal.classList.remove('open');
  document.body.style.overflow = '';
}

btnAnd.addEventListener('click', () => {
  if (!active) return;
  const base   = location.href.replace(/\/[^/]*$/, '/');
  const glbUrl = `${base}${active.id}.glb`;
  if (isAndroid) {
    location.href =
      'intent://arvr.google.com/scene-viewer/1.0' +
      '?file=' + encodeURIComponent(glbUrl) +
      '&mode=ar_preferred' +
      '#Intent;scheme=https;package=com.google.ar.core' +
      ';action=android.intent.action.VIEW' +
      ';S.browser_fallback_url=' + encodeURIComponent(location.href) + ';end;';
  } else {
    alert('ARはスマートフォン（iOS / Android）でご利用ください。');
  }
});

btnCls.addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

/* Keyboard: Esc to close */
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
