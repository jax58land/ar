<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AR Viewer</title>

  <!-- model-viewer（Web上で3D表示→AR起動） -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    header { position: fixed; top: 0; left: 0; right: 0; padding: 10px 12px; background: rgba(0,0,0,.55); color: #fff; font: 14px/1.4 system-ui, -apple-system, sans-serif; z-index: 10; }
    model-viewer { width: 100%; height: 100%; }
    .wrap { height: 100%; }
  </style>
</head>

<body>
  <header>
    （iPhone: Quick Look / Android: Scene Viewer）
  </header>

  <div class="wrap">
    <model-viewer
      src="./model.glb"
      ios-src="./model.usdz"
      ar
      ar-modes="scene-viewer quick-look"
      camera-controls
      auto-rotate
      exposure="1"
      style="height:100vh;"
    >
    </model-viewer>
  </div>
</body>
</html>
