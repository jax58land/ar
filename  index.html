<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AR Viewer</title>

  <!-- model-viewer -->
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }
    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<model-viewer
  src="model.glb"
  ios-src="model.usdz"
  ar
  ar-modes="scene-viewer quick-look"
  camera-controls
  shadow-intensity="1"
  autoplay>

</model-viewer>

</body>
</html>
